name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  unit-tests:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start database service
        run: docker compose -f docker-compose.yml up -d

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build & Run Unit Tests
        working-directory: secure-tasks-api
        run: mvn clean test

      - name: Upload Unit Test results
        uses: actions/upload-artifact@master
        with:
           name: Unit test report
           path: ${{github.workspace}}/secure-tasks-api/target/surefire-reports

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # - name: Download Maven dependencies
      #   working-directory: secure-tasks-api
      #   run: mvn dependency:copy-dependencies

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
      
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Run OWASP Dependency-Check via Maven
        working-directory: ./secure-tasks-api
        run: mvn org.owasp:dependency-check-maven:check -Dformat=ALL -DfailBuildOnCVSS=7 -DenableRetired=true

      # - name: OWASP Dependency Check
      #   uses: dependency-check/Dependency-Check_Action@main
      #   id: Dpcheck
      #   env:
      #     # actions/setup-java@v1 changes JAVA_HOME so it needs to be reset to match the depcheck image
      #     JAVA_HOME: /opt/jdk
      #   with:
      #     project: 'secure-tasks-api'
      #     path: './secure-tasks-api'
      #     format: ALL
      #     args: >
      #       --failOnCVSS 7
      #       --enableRetired

      - name: Upload Test results
        if: always()
        uses: actions/upload-artifact@master
        with:
           name: Depcheck report
           path: ${{github.workspace}}/reports